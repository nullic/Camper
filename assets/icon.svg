<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="mountain1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#0a2540"/>
    </linearGradient>
    <linearGradient id="mountain2" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#16294d"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
    <linearGradient id="tent" x1="256" y1="160" x2="256" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e84393"/>
      <stop offset="100%" stop-color="#c0305e"/>
    </linearGradient>
    <linearGradient id="tentRight" x1="256" y1="160" x2="256" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c0305e"/>
      <stop offset="100%" stop-color="#9a2349"/>
    </linearGradient>
    <linearGradient id="fire1" x1="0" y1="1" x2="0" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ff4500"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="fire2" x1="0" y1="1" x2="0" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ff6b00"/>
      <stop offset="100%" stop-color="#fff176"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#ff6b00" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff6b00" stop-opacity="0"/>
    </radialGradient>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="110"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <g clip-path="url(#round)">

    <!-- Stars -->
    <circle cx="80"  cy="70"  r="2.5" fill="white" opacity="0.9"/>
    <circle cx="150" cy="45"  r="1.8" fill="white" opacity="0.7"/>
    <circle cx="220" cy="80"  r="1.5" fill="white" opacity="0.6"/>
    <circle cx="310" cy="50"  r="2.2" fill="white" opacity="0.85"/>
    <circle cx="390" cy="75"  r="1.5" fill="white" opacity="0.65"/>
    <circle cx="440" cy="45"  r="2.0" fill="white" opacity="0.8"/>
    <circle cx="60"  cy="130" r="1.5" fill="white" opacity="0.5"/>
    <circle cx="470" cy="120" r="1.8" fill="white" opacity="0.6"/>
    <circle cx="350" cy="100" r="1.2" fill="white" opacity="0.5"/>
    <circle cx="130" cy="110" r="1.2" fill="white" opacity="0.45"/>

    <!-- Far mountain (back) -->
    <polygon points="0,420 180,160 360,420" fill="#0c2444" opacity="0.9"/>
    <polygon points="150,420 330,185 510,420" fill="#0e2b4f" opacity="0.85"/>

    <!-- Near mountains -->
    <polygon points="-10,430 140,240 310,430" fill="url(#mountain2)"/>
    <polygon points="200,430 360,220 530,430" fill="url(#mountain1)"/>

    <!-- Snow caps -->
    <polygon points="140,240 160,268 120,268" fill="white" opacity="0.15"/>
    <polygon points="360,220 380,250 340,250" fill="white" opacity="0.12"/>

    <!-- Ground -->
    <rect x="0" y="420" width="512" height="92" fill="#0a1a2e"/>

    <!-- Campfire glow on ground -->
    <ellipse cx="256" cy="415" rx="90" ry="30" fill="url(#glow)"/>

    <!-- Tent left panel -->
    <polygon points="256,165 110,390 256,390" fill="url(#tent)"/>
    <!-- Tent right panel -->
    <polygon points="256,165 402,390 256,390" fill="url(#tentRight)"/>

    <!-- Tent door arch -->
    <path d="M220,390 Q220,340 256,330 Q292,340 292,390 Z" fill="#1a1a2e" opacity="0.85"/>

    <!-- Tent ridge line -->
    <line x1="256" y1="165" x2="256" y2="390" stroke="white" stroke-width="2" opacity="0.15"/>

    <!-- Campfire logs -->
    <ellipse cx="256" cy="415" rx="38" ry="9" fill="#5d3a1a" opacity="0.9"/>
    <rect x="222" y="408" width="68" height="9" rx="4.5" fill="#6b4423" transform="rotate(-20,256,412)"/>
    <rect x="222" y="408" width="68" height="9" rx="4.5" fill="#7a4f2a" transform="rotate(20,256,412)"/>

    <!-- Campfire flames (back layer) -->
    <g filter="url(#softglow)">
      <path d="M248,414 Q240,395 250,375 Q254,385 256,370 Q258,385 262,375 Q272,395 264,414 Z"
            fill="url(#fire1)" opacity="0.75"/>
    </g>

    <!-- Campfire flames (front layer) -->
    <path d="M250,414 Q244,400 252,384 Q255,392 256,378 Q257,392 260,384 Q268,400 262,414 Z"
          fill="url(#fire2)" opacity="0.95"/>

    <!-- Inner flame -->
    <path d="M252,414 Q250,405 256,394 Q262,405 260,414 Z" fill="#fff9c4" opacity="0.9"/>

    <!-- Spark particles -->
    <circle cx="242" cy="370" r="2" fill="#ffd700" opacity="0.8"/>
    <circle cx="268" cy="362" r="1.5" fill="#ffa500" opacity="0.7"/>
    <circle cx="250" cy="355" r="1.2" fill="#ffd700" opacity="0.5"/>
    <circle cx="264" cy="375" r="1" fill="#ff8c00" opacity="0.6"/>

  </g>
</svg>
